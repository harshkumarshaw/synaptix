# Alembic configuration for Synaptix monorepo.
# Single migration chain for ALL services (ADR-004).
# Migrations live in services/_migrations/versions/

[alembic]
# Path to migrations directory (relative to this file)
script_location = services/_migrations

# SQLAlchemy async URL — overridden by env var in env.py
sqlalchemy.url = postgresql+asyncpg://snx:snx_dev_pass@localhost:5432/synaptix_dev

# Template for new migration filenames
file_template = %%(year)d%%(month)02d%%(day)02d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = Asia/Kolkata

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
