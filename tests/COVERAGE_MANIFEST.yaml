# ============================================================================
# LAYER 2: ACADEMIC — Attendance Engine (most critical module)
# ============================================================================

attendance_engine:
  module_id: A-11
  test_file_prefix: "tests/unit/attendance/"
  enforcement: "HARD_FAIL"  # NMC compliance — cannot defer
  
  nmc_compliance_tests:
    - id: "ATT-NMC-001"
      description: "Student with EXACTLY 75.00% theory attendance is ELIGIBLE for theory exam"
      type: compliance
      nmc_ref: "GMER 2019 §11.1"
    - id: "ATT-NMC-002"
      description: "Student with 74.99% theory attendance is BLOCKED for theory exam"
      type: compliance
      nmc_ref: "GMER 2019 §11.1"
    - id: "ATT-NMC-003"
      description: "Student with EXACTLY 80.00% practical attendance is ELIGIBLE for practical exam"
      type: compliance
      nmc_ref: "GMER 2019 §11.1"
    - id: "ATT-NMC-004"
      description: "Student with 79.99% practical attendance is BLOCKED for practical exam"
      type: compliance
      nmc_ref: "GMER 2019 §11.1"
    - id: "ATT-NMC-005"
      description: "Student with 76% theory AND 79% practical: theory eligible, practical blocked"
      type: compliance
      nmc_ref: "GMER 2019 §11.1"
    - id: "ATT-NMC-006"
      description: "Student with 74% theory AND 81% practical: theory blocked, practical eligible"
      type: compliance
      nmc_ref: "GMER 2019 §11.1"
    - id: "ATT-NMC-007"
      description: "Clinical posting attendance counted toward 80% practical pool, not 75% theory"
      type: compliance
    - id: "ATT-NMC-008"
      description: "DOAP session attendance counted toward 80% practical pool"
      type: compliance
    - id: "ATT-NMC-009"
      description: "ECE session attendance counted toward 80% practical pool"
      type: compliance
    - id: "ATT-NMC-010"
      description: "Theory lecture attendance counted toward 75% theory pool"
      type: compliance
    - id: "ATT-NMC-011"
      description: "Elective Block 1 attendance threshold is 75% (separate pool)"
      type: compliance
      nmc_ref: "GMER 2019 §9.3"
    - id: "ATT-NMC-012"
      description: "Elective Block 2 attendance threshold is 75% (separate pool)"
      type: compliance
      nmc_ref: "GMER 2019 §9.3"
    - id: "ATT-NMC-013"
      description: "AETCOM attendance tracked separately from theory and practical"
      type: compliance
      nmc_ref: "AETCOM Module 2018"
    - id: "ATT-NMC-014"
      description: "Foundation Course attendance tracked separately"
      type: compliance
      nmc_ref: "Foundation Course Module 2019"
    - id: "ATT-NMC-015"
      description: "Multi-phase subject (Community Medicine) aggregates attendance across phases"
      type: compliance
    - id: "ATT-NMC-016"
      description: "Principal can grant attendance exemption with audit-logged reason"
      type: compliance
    - id: "ATT-NMC-017"
      description: "Exemption is audit-logged with reason, approver, and timestamp"
      type: compliance
    - id: "ATT-NMC-018"
      description: "Attendance denominator counts ONLY conducted sessions, NEVER planned"
      type: compliance
      audit_ref: "AUDIT-D3"
    - id: "ATT-NMC-019"
      description: "Cancelled session does not count toward attendance denominator"
      type: compliance
    - id: "ATT-NMC-020"
      description: "Late arrival (configurable threshold) counts as half-attendance if configured"
      type: compliance
  
  critical_tests:
    - id: "ATT-001"
      description: "Mark attendance via manual roll call"
      type: unit
    - id: "ATT-002"
      description: "Mark attendance via QR code scan"
      type: unit
    - id: "ATT-003"
      description: "Mark attendance via RFID"
      type: unit
    - id: "ATT-004"
      description: "Mark attendance via face recognition"
      type: unit
    - id: "ATT-005"
      description: "Mark attendance via GPS (with geofence validation)"
      type: unit
    - id: "ATT-006"
      description: "Mark attendance via biometric"
      type: unit
    - id: "ATT-007"
      description: "Attendance status: present, absent, late, excused, medical, official_duty"
      type: unit
    - id: "ATT-008"
      description: "Attendance percentage calculated correctly"
      type: unit
    - id: "ATT-009"
      description: "At-risk student list correctly identifies students below threshold"
      type: integration
    - id: "ATT-010"
      description: "Attendance trajectory prediction works (improving/declining/stable)"
      type: integration

  edge_cases:
    - id: "ATT-E001"
      description: "Two faculty mark same student differently for same event — last write wins by timestamp"
      type: edge_case
      audit_ref: "AUDIT-E8"
    - id: "ATT-E002"
      description: "Offline attendance with timestamp 2 hours after session end — flagged for faculty review, not auto-rejected"
      type: edge_case
    - id: "ATT-E003"
      description: "Duplicate attendance entry (same student, same event) is rejected"
      type: edge_case
    - id: "ATT-E004"
      description: "Attendance marked for cancelled event — flagged for admin review"
      type: edge_case
      audit_ref: "AUDIT-F2"
    - id: "ATT-E005"
      description: "Bulk attendance change (>20 students marked absent at once) triggers confirmation"
      type: edge_case
      audit_ref: "AUDIT-3.10"
    - id: "ATT-E006"
      description: "Attendance correction window: faculty can correct within 24h, after that needs HOD approval"
      type: edge_case
      audit_ref: "AUDIT-3.10"
    - id: "ATT-E007"
      description: "Student with disability accommodation: uses adjusted threshold per Dean approval"
      type: edge_case
      audit_ref: "AUDIT-E6"
    - id: "ATT-E008"
      description: "Emergency override (pandemic): temporary threshold reduction applies"
      type: edge_case
      audit_ref: "AUDIT-E7"
    - id: "ATT-E009"
      description: "Integration session attendance category inherits primary subject's category"
      type: edge_case
      audit_ref: "AUDIT-C4"
    - id: "ATT-E010"
      description: "Lateral entry student: prior phase attendance not included in current pct calculation"
      type: edge_case
      audit_ref: "AUDIT-E1"
    - id: "ATT-E011"
      description: "Detained student: attendance resets for repeated phase, prior phase retained as history"
      type: edge_case
      audit_ref: "AUDIT-E2"
    - id: "ATT-E012"
      description: "Section change mid-year: attendance from both sections aggregated"
      type: edge_case
      audit_ref: "AUDIT-O4"
    - id: "ATT-E013"
      description: "Multiple faculty per event: any faculty in faculty_ids can mark attendance"
      type: edge_case
      audit_ref: "AUDIT-E8"
    - id: "ATT-E014"
      description: "Faculty resignation: future sessions reassigned, past sessions retain original faculty_id"
      type: edge_case
      audit_ref: "AUDIT-O1"
    - id: "ATT-E015"
      description: "Phase transition: provisional status until prior exam results published"
      type: edge_case
      audit_ref: "AUDIT-3.7"
    - id: "ATT-E016"
      description: "Concurrent attendance writes from two devices: unique constraint prevents duplicates"
      type: edge_case
    - id: "ATT-E017"
      description: "QR code reused: server rejects scans outside time window"
      type: security
    - id: "ATT-E018"
      description: "QR code HMAC tampering: server rejects invalid signatures"
      type: security
    - id: "ATT-E019"
      description: "GPS attendance outside geofence: marked but flagged for review"
      type: edge_case
    - id: "ATT-E020"
      description: "Same student scans QR from two different devices: second scan rejected"
      type: edge_case
      audit_ref: "AUDIT-6.2"

  offline_sync_tests:
    - id: "ATT-SYNC-001"
      description: "Offline attendance entry persists in SQLite"
      type: mobile_unit
    - id: "ATT-SYNC-002"
      description: "Sync on connectivity restoration syncs oldest first"
      type: mobile_integration
    - id: "ATT-SYNC-003"
      description: "Per-entry transactional sync (interruption doesn't lose later entries)"
      type: mobile_integration
      audit_ref: "AUDIT-F1"
    - id: "ATT-SYNC-004"
      description: "Failed sync entry retried 3x with exponential backoff"
      type: mobile_integration
    - id: "ATT-SYNC-005"
      description: "Sync conflict (same student, same event, different status): later timestamp wins"
      type: mobile_integration
    - id: "ATT-SYNC-006"
      description: "Sync report visible to user (X synced, Y pending, Z failed)"
      type: mobile_unit
    - id: "ATT-SYNC-007"
      description: "Power outage during sync: resumes from last unacknowledged record"
      type: mobile_integration
      audit_ref: "AUDIT-6.1"

