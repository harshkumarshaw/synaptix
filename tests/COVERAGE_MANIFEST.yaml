# Synaptix Test Coverage Manifest
# This is the SOURCE OF TRUTH for required test cases.
# Every module MUST have ALL listed test cases implemented.
# The pre-commit hook reads this file and FAILS THE BUILD if any test is missing.
#
# Agents: do NOT modify this file. If you believe a test is wrong, escalate via
# docs/HANDOFF_NOTES.md with [COVERAGE_MANIFEST PROPOSAL] prefix.

version: "1.0"
last_updated: "2026-06-18"
enforcement_mode: "hard_fail"  # build fails if any test missing or failing

# ============================================================================
