# ============================================================================
# CROSS-CUTTING: Multi-Tenancy
# ============================================================================

multi_tenancy:
  module_id: F-00
  test_file_prefix: "tests/security/tenancy/"
  enforcement: "HARD_FAIL"  # Data leakage is the worst possible bug
  
  critical_tests:
    - id: "TNT-001"
      description: "API request with no tenant context is rejected"
      type: security
    - id: "TNT-002"
      description: "User from tenant A cannot read tenant B data"
      type: security
    - id: "TNT-003"
      description: "User from tenant A cannot write to tenant B"
      type: security
    - id: "TNT-004"
      description: "RLS policy enforces isolation at DB level even if middleware fails"
      type: security
    - id: "TNT-005"
      description: "JWT with tampered tenant_id is rejected"
      type: security
    - id: "TNT-006"
      description: "Aggregate analytics at super-admin level can see across tenants"
      type: integration
    - id: "TNT-007"
      description: "Cross-tenant faculty (same person in two tenants): separate sessions"
      type: integration
      audit_ref: "AUDIT-3.5"

